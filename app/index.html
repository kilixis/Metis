<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Noted</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="index.js" defer></script>
</head>

<body>
    <div id="landing">
        <div id="top-bar">
            <span id="wordmark">metisnotes</span>
        </div>

        <div id="hero">
            <div id="hero-left">
                <div id="hero-text">
                    <h1 id="headline">
                        <span class="line">Write without</span>
                        <span class="line">the noise.</span>
                    </h1>
                    <p id="subline">A minimal notes app with markdown support, sharing, and no clutter.</p>
                </div>
                <div id="cta-group">
                    <a href="main.html" id="btn-guest">Continue without an account</a>
                    <a href="auth.html" id="btn-auth">Sign up / Sign in</a>
                </div>
            </div>
            <div id="hero-right">
                <div id="demo-container">
                    <div id="demo-title-bar">
                        <span id="demo-title-text"></span>
                        <span id="demo-cursor-title">|</span>
                    </div>
                    <div id="demo-body">
                        <div id="demo-text"></div>
                        <span id="demo-cursor-body">|</span>
                    </div>
                </div>
            </div>
        </div>

        <div id="footer">
            <span>Free to use. No ads.</span>
        </div>
    </div>
</body>

</html>
