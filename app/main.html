<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <title>New note</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="main.js" defer></script>
</head>

<body>
    <div id="sidebar-overlay"></div>

    <div id="sidebar">
        <div id="sidebar-header">
            <span>Notes</span>
            <button id="new-note">+</button>
        </div>
        <div id="note-list"></div>
    </div>

    <button id="sidebar-toggle">☰</button>

    <div id="md-toggle-container">
        <span>Hide Markdown</span>
        <label class="switch">
            <input type="checkbox" id="md-toggle">
            <span class="slider"></span>
        </label>
    </div>

    <!-- Dynamic Island -->
    <div id="island">
        <div id="island-icons">
            <!-- Share button + its panel -->
            <button class="island-btn" id="btn-share" title="Share">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                    <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
                </svg>
            </button>
            <div class="island-panel" id="panel-share">
                <div class="island-sep"></div>
                <button class="panel-item" id="action-copy-link">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    Copy link
                </button>
                <button class="panel-item" id="action-download-md">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    .md
                </button>
                <button class="panel-item" id="action-download-pdf">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    .pdf
                </button>
                <button class="panel-item" id="action-download-txt">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                    .txt
                </button>
            </div>

            <!-- Format button + its panel -->
            <button class="island-btn" id="btn-format" title="Format">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                </svg>
            </button>
            <div class="island-panel" id="panel-format">
                <div class="island-sep"></div>
                <button class="panel-item fmt-btn" data-action="bold"><strong>B</strong></button>
                <button class="panel-item fmt-btn" data-action="italic"><em>I</em></button>
                <button class="panel-item fmt-btn" data-action="underline"><u>U</u></button>
                <button class="panel-item fmt-btn" data-action="strikethrough"><s>S</s></button>
                <div class="panel-divider"></div>
                <button class="panel-item fmt-btn" data-action="h1">H1</button>
                <button class="panel-item fmt-btn" data-action="h2">H2</button>
                <button class="panel-item fmt-btn" data-action="h3">H3</button>
                <div class="panel-divider"></div>
                <button class="panel-item fmt-btn" data-action="bullet">• List</button>
                <button class="panel-item fmt-btn" data-action="blockquote">" Quote</button>
                <button class="panel-item fmt-btn" data-action="code">` Code</button>
                <button class="panel-item fmt-btn" data-action="subtext">Sub</button>
            </div>

            <!-- Account button + its panel -->
            <button class="island-btn" id="btn-account" title="Account">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
            </button>
            <div class="island-panel" id="panel-account">
                <div class="island-sep"></div>
                <button class="panel-item" id="action-settings">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    Settings
                </button>
                <button class="panel-item" id="action-signin">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
                    Sign in
                </button>
                <button class="panel-item" id="action-signout">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign out
                </button>
            </div>
        </div>
    </div>

    <div id="settings-overlay"></div>
    <div id="settings-panel">
        <div id="settings-header">
            <span>Settings</span>
            <button id="settings-close">×</button>
        </div>
        <div id="settings-body">
            <div class="settings-section">
                <div class="settings-section-title">Account</div>
                <div class="settings-row" id="settings-user-email"></div>
                <div class="settings-row">
                    <span>Change password</span>
                    <button class="settings-action-btn" id="btn-change-password">Send reset email</button>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-section-title">Editor</div>
                <div class="settings-row">
                    <span>Font size</span>
                    <div class="settings-stepper">
                        <button class="stepper-btn" id="font-decrease">−</button>
                        <span id="font-size-label">19</span>
                        <button class="stepper-btn" id="font-increase">+</button>
                    </div>
                </div>
                <div class="settings-row">
                    <span>Line height</span>
                    <div class="settings-stepper">
                        <button class="stepper-btn" id="lh-decrease">−</button>
                        <span id="lh-label">1.6</span>
                        <button class="stepper-btn" id="lh-increase">+</button>
                    </div>
                </div>
                <div class="settings-row">
                    <span>Spellcheck</span>
                    <label class="switch">
                        <input type="checkbox" id="spellcheck-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-section-title">Danger zone</div>
                <div class="settings-row">
                    <span>Delete all notes</span>
                    <button class="settings-action-btn danger" id="btn-delete-notes">Delete all</button>
                </div>
                <div class="settings-row">
                    <span>Delete account</span>
                    <button class="settings-action-btn danger" id="btn-delete-account">Delete account</button>
                </div>
            </div>
        </div>
    </div>

    <div id="container">
        <input type="text" placeholder="Title" id="title">
        <textarea id="editor" placeholder="..."></textarea>
        <div id="preview"></div>
    </div>
</body>

</html>
