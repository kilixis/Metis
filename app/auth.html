<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="auth.css">
    <title>Sign in</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="auth.js" defer></script>
</head>

<body>
    <div id="auth-container">
        <div id="auth-header">
            <h1 id="auth-title">Welcome back.</h1>
            <p id="auth-subtitle">Sign in to your account to continue.</p>
        </div>

        <div id="auth-form-wrap">
            <div id="field-name" class="field hidden">
                <label>Name</label>
                <input type="text" id="input-name" placeholder="Your name" autocomplete="name">
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="input-email" placeholder="you@example.com" autocomplete="email">
            </div>
            <div class="field">
                <label>Password</label>
                <div class="password-wrap">
                    <input type="password" id="input-password" placeholder="••••••••" autocomplete="current-password">
                    <button type="button" id="toggle-password" tabindex="-1">
                        <svg id="eye-open" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        <svg id="eye-closed" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                    </button>
                </div>
            </div>

            <p id="auth-error"></p>

            <button id="auth-submit">Sign in</button>

            <p id="auth-switch">Don't have an account? <button id="switch-btn">Sign up</button></p>
        </div>
    </div>
</body>

</html>
